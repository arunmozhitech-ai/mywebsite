apiVersion: v1
kind: Namespace
metadata:
  name: ai-ml-study-hub
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-ml-study-hub-secret
  namespace: ai-ml-study-hub
type: Opaque
stringData:
  ADMIN_UPLOAD_KEY: "change-this-before-deploying"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-ml-study-hub-backend-data
  namespace: ai-ml-study-hub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ml-study-hub-backend
  namespace: ai-ml-study-hub
  labels:
    app.kubernetes.io/name: ai-ml-study-hub
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-ml-study-hub
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-ml-study-hub
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: ghcr.io/YOUR_GITHUB_USER/ai-ml-study-hub-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ADMIN_UPLOAD_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-ml-study-hub-secret
                  key: ADMIN_UPLOAD_KEY
            - name: PY_BACKEND_HOST
              value: 0.0.0.0
            - name: PY_BACKEND_PORT
              value: "8000"
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: backend-data
              mountPath: /app/backend/data
              subPath: data
            - name: backend-data
              mountPath: /app/backend/uploads
              subPath: uploads
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: ai-ml-study-hub-backend-data
---
apiVersion: v1
kind: Service
metadata:
  name: ai-ml-study-hub-backend
  namespace: ai-ml-study-hub
  labels:
    app.kubernetes.io/name: ai-ml-study-hub
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: ai-ml-study-hub
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ml-study-hub-frontend
  namespace: ai-ml-study-hub
  labels:
    app.kubernetes.io/name: ai-ml-study-hub
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-ml-study-hub
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-ml-study-hub
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_GITHUB_USER/ai-ml-study-hub-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-ml-study-hub-frontend
  namespace: ai-ml-study-hub
  labels:
    app.kubernetes.io/name: ai-ml-study-hub
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: ai-ml-study-hub
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ml-study-hub
  namespace: ai-ml-study-hub
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 55m
spec:
  ingressClassName: nginx
  rules:
    - host: ai-ml-study-hub.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-ml-study-hub-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-ml-study-hub-frontend
                port:
                  number: 80
